name: Supabase Types - Drift Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/generate-types.ts"
      - "packages/shared/src/types/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/supabase-types-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/generate-types.ts"
      - "packages/shared/src/types/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/supabase-types-ci.yml"

env:
  NODE_VERSION: "18"

jobs:
  drift-check:
    name: Verify generated Supabase types are up to date
    runs-on: ubuntu-latest
    # Secrets are NOT available to workflows triggered from forks (pull_request).
    # Skip drift checking in that case; maintainers can run it after merge, or via a non-fork PR.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets are configured
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
          SUPABASE_PROJECT_REF: ${{ secrets['SUPABASE_PROJECT_REF'] }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing required GitHub repo secrets for Supabase type generation."
            echo "Set: SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF"
            exit 1
          fi

      - name: Generate types (remote)
        env:
          # Required by the Supabase CLI for non-interactive auth.
          SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
          # Used by our generator script to know which project to introspect.
          SUPABASE_PROJECT_REF: ${{ secrets['SUPABASE_PROJECT_REF'] }}
        run: npm run types:generate

      - name: Fail if generated types changed
        run: |
          if ! git diff --exit-code -- packages/shared/src/types/database.ts; then
            echo "Detected schema/type drift: packages/shared/src/types/database.ts is not up to date."
            echo "Run: npm run types:generate"
            echo "Then commit the updated file."
            exit 1
          fi

